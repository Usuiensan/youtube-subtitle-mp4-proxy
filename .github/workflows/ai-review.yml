name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AI quality platform
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install git+https://github.com/Usuiensan/ai-quality-platform-2.git@main

      - name: Create PR diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff --binary "origin/${{ github.event.pull_request.base.ref }}...HEAD" > pr.diff

      - name: Run AI review
        env:
          AI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python -m ai_quality_platform.cli --config .ai-quality.yml --diff pr.diff --github-pr --yes
