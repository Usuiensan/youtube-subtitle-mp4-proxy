name: AI Quality Gate (Self-Hosted)

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: [self-hosted, windows, x64, ollama]
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Python
        shell: pwsh
        run: python --version

      - name: Install AI Quality Platform
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install git+https://github.com/Usuiensan/ai-quality-platform-2.git@main

      - name: Create PR diff
        shell: pwsh
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff --binary "origin/${{ github.event.pull_request.base.ref }}...HEAD" > pr.diff

      - name: Run AI Quality Gate
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python -m ai_quality_platform.cli --config .ai-quality.yml --github-pr --autofix-root . --diff pr.diff --yes
